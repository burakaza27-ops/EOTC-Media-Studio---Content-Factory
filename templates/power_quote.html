<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Power Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #020617;
      --bg-secondary: #0a0f1c;
      --bg-tertiary: #0d1424;
      --accent-indigo: #1e1b4b;
      --accent-gold: #d4af37;
      --accent-gold-light: #e8c84a;
      --accent-gold-dim: #b8962e;
      --text-primary: #f8fafc;
      --text-secondary: rgba(248, 250, 252, 0.6);
      --text-muted: rgba(248, 250, 252, 0.35);
      --glass-bg: rgba(255, 255, 255, 0.025);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-highlight: rgba(255, 255, 255, 0.03);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans Ethiopic', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
    }

    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 100% 60% at 30% 100%, rgba(30, 27, 75, 0.8) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 10%, rgba(30, 27, 75, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 60% 40%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
    }

    .mesh-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(at 20% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
        radial-gradient(at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 40%);
      animation: gradientShift 15s ease infinite;
      background-size: 200% 200%;
    }

    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .frame {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 3px;
      pointer-events: none;
      z-index: 2;
    }

    .frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(180deg, rgba(255,255,255,0.015) 0%, transparent 100%);
    }

    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 400px;
      opacity: 0.012;
      color: #ffffff;
      pointer-events: none;
      z-index: 0;
      font-weight: 300;
      letter-spacing: -0.05em;
    }

    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 100px;
      z-index: 1;
    }

    .quote-container {
      max-width: 700px;
      position: relative;
    }

    .header-badge {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--accent-gold);
      text-transform: uppercase;
      font-weight: 600;
    }

    .glass-card {
      background: linear-gradient(135deg, var(--glass-bg), rgba(255,255,255,0.015));
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 80px 90px 70px;
      border-radius: 3px;
      position: relative;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    .gold-line {
      position: absolute;
      left: 0;
      top: 50px;
      bottom: 50px;
      width: 2px;
      background: linear-gradient(180deg, 
        transparent 0%, 
        var(--accent-gold) 20%, 
        var(--accent-gold) 80%, 
        transparent 100%);
      border-radius: 1px;
    }

    .quote-decoration {
      position: absolute;
      top: 35px;
      left: 75px;
      font-size: 48px;
      color: var(--accent-gold);
      opacity: 0.4;
      line-height: 1;
      font-weight: 300;
    }

    .quote-text {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.65;
      padding-left: 40px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      animation: fadeIn 0.6s ease-out both;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 50px;
    }

    .divider-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    }

    .divider-icon {
      font-size: 16px;
      color: var(--accent-gold);
      opacity: 0.5;
    }

    .brand {
      position: absolute;
      bottom: 55px;
      right: 60px;
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .meta {
      position: absolute;
      bottom: 55px;
      left: 60px;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 500;
    }

    .corner-accent {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .corner-accent.top-left {
      top: 40px;
      left: 40px;
      border-right: none;
      border-bottom: none;
    }

    .corner-accent.bottom-right {
      bottom: 40px;
      right: 40px;
      border-left: none;
      border-top: none;
    }

    .floating-cross {
      position: absolute;
      font-size: 40px;
      opacity: 0.08;
      color: var(--accent-gold);
      animation: pulse 4s ease-in-out infinite;
    }

    .floating-cross.top-right {
      top: 100px;
      right: 100px;
    }

    .floating-cross.bottom-left {
      bottom: 100px;
      left: 100px;
      animation-delay: 2s;
    }

    .swirl {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 1px solid rgba(212, 175, 55, 0.04);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .swirl::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      width: 2px;
      height: 40px;
      background: var(--accent-gold);
      opacity: 0.2;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="mesh-gradient"></div>
  <div class="noise-overlay"></div>
  <div class="frame"></div>
  <div class="watermark">✝</div>
  <div class="swirl"></div>
  <div class="floating-cross top-right">✝</div>
  <div class="floating-cross bottom-left">✝</div>
  <div class="corner-accent top-left"></div>
  <div class="corner-accent bottom-right"></div>
  
  <div class="content">
    <div class="quote-container">
      <div class="header-badge">ሰላም እግዚአብሔር</div>
      
      <div class="glass-card">
        <div class="gold-line"></div>
        <div class="quote-decoration">"</div>
        <p class="quote-text" id="quote-text">።።።</p>
        
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-icon">✝</span>
          <div class="divider-line"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="meta">Divine Peace</div>
  <div class="brand">EOTC Youth</div>
</body>
</html>
