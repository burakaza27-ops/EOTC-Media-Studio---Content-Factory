<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Power Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #040507;
      --bg-secondary: #090a0f;
      --bg-tertiary: #12141b;
      --accent-gold: #d4af37;
      --accent-gold-light: #f3e5ab;
      --accent-gold-bright: #ffd700;
      --accent-gold-dim: #8a7322;
      --accent-glow: rgba(212, 175, 55, 0.2);
      --accent-glow-strong: rgba(212, 175, 55, 0.35);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.92);
      --text-muted: rgba(255, 255, 255, 0.5);
      --glass-bg: rgba(20, 22, 28, 0.5);
      --glass-border: rgba(212, 175, 55, 0.25);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    html {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans Ethiopic', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* === Multi-layer atmospheric background === */
    .ambient-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(212, 175, 55, 0.10) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 75%, rgba(212, 175, 55, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(30, 30, 50, 0.4) 0%, transparent 70%),
        linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #07080d 100%);
      z-index: 0;
    }

    /* Secondary light bloom */
    .ambient-bloom {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.04) 0%, transparent 50%);
      z-index: 0;
    }

    /* High-frequency noise texture for grain/depth */
    .texture-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* Vignette for cinematic framing */
    .vignette {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* === Ornamental frame === */
    .ornamental-frame {
      position: absolute;
      top: 45px; left: 45px; right: 45px; bottom: 45px;
      border: 1px solid rgba(212, 175, 55, 0.18);
      pointer-events: none;
      z-index: 2;
    }
    .ornamental-frame::before, .ornamental-frame::after {
      content: ''; position: absolute; width: 32px; height: 32px;
      border: 2px solid var(--accent-gold);
    }
    .ornamental-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
    .ornamental-frame::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

    .corner-tl { position: absolute; top: -2px; right: -2px; width: 32px; height: 32px; border-top: 2px solid var(--accent-gold); border-right: 2px solid var(--accent-gold); }
    .corner-br { position: absolute; bottom: -2px; left: -2px; width: 32px; height: 32px; border-bottom: 2px solid var(--accent-gold); border-left: 2px solid var(--accent-gold); }

    /* Large watermark cross */
    .large-watermark {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 800px;
      color: rgba(255, 255, 255, 0.015);
      font-family: serif;
      pointer-events: none;
      z-index: 1;
      line-height: 1;
    }

    /* === Main content === */
    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px;
    }

    .quote-mark-open {
      position: absolute;
      top: -42px;
      left: 38px;
      font-size: 140px;
      color: rgba(212, 175, 55, 0.18);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1;
      pointer-events: none;
    }

    .card {
      background: linear-gradient(148deg, rgba(30, 32, 42, 0.75), rgba(14, 15, 20, 0.85));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      padding: 80px 100px;
      position: relative;
      box-shadow:
        0 60px 120px rgba(0,0,0,0.65),
        0 20px 60px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.3);
      max-width: 850px;
      width: 100%;
      text-align: center;
      animation: float 12s ease-in-out infinite;
    }

    .card-top-accent {
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold-bright), var(--accent-gold), transparent);
      box-shadow: 0 2px 12px var(--accent-glow-strong);
    }

    .theme-badge {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #191b24, #13151c);
      border: 1px solid var(--glass-border);
      color: var(--accent-gold-light);
      padding: 8px 32px;
      border-radius: 30px;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      box-shadow: 0 12px 35px rgba(0,0,0,0.55), 0 0 15px rgba(212, 175, 55, 0.08);
      white-space: nowrap;
    }

    .quote-text {
      font-size: clamp(36px, 5vw, 54px);
      font-weight: 800;
      line-height: 1.45;
      background: linear-gradient(140deg, #ffffff 30%, var(--accent-gold-light) 55%, #ffffff 75%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 2;
      letter-spacing: -0.01em;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
      overflow: hidden;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
    }

    .separator {
      margin: 50px auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .separator-line {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold-dim), transparent);
    }
    .separator-icon {
      color: var(--accent-gold);
      font-size: 22px;
      filter: drop-shadow(0 0 6px var(--accent-glow));
      animation: glowPulse 4s ease-in-out infinite;
    }

    /* === Footer === */
    .footer {
      position: absolute;
      bottom: 78px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--accent-gold);
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.15);
    }
    .brand-text {
      font-size: 14px;
      letter-spacing: 0.4em;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 700;
    }
    .brand-gold {
      color: var(--accent-gold);
    }

    .daily-tag {
      font-size: 13px;
      letter-spacing: 0.4em;
      color: var(--accent-gold);
      text-transform: uppercase;
      border: 1px solid var(--glass-border);
      padding: 7px 22px;
      border-radius: 20px;
      font-weight: 800;
      background: rgba(212, 175, 55, 0.04);
    }

  </style>
</head>
<body>
  <div class="ambient-bg"></div>
  <div class="ambient-bloom"></div>
  <div class="texture-overlay"></div>
  <div class="vignette"></div>
  <div class="large-watermark">✝</div>
  
  <div class="ornamental-frame">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
  </div>

  <div class="content-wrapper">
    <div class="card">
      <div class="card-top-accent"></div>
      <div class="theme-badge" id="theme-badge">መንፈሳዊ ቃል</div>
      <div class="quote-mark-open">❝</div>
      
      <p class="quote-text" id="quote-text">።።።</p>
      
      <div class="separator">
        <div class="separator-line"></div>
        <div class="separator-icon">❖</div>
        <div class="separator-line"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="brand-logo">
      <div class="brand-icon">✝</div>
      <div class="brand-text">EOTC <span class="brand-gold">Youth</span></div>
    </div>
    <div class="daily-tag">Daily Inspiration</div>
  </div>
</body>
</html>
