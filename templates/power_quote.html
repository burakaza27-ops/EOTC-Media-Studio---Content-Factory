<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Power Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #050608;
      --bg-secondary: #0a0b10;
      --bg-tertiary: #13151c;
      --accent-gold: #d4af37;
      --accent-gold-light: #f3e5ab;
      --accent-gold-dim: #8a7322;
      --accent-glow: rgba(212, 175, 55, 0.2);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.9);
      --text-muted: rgba(255, 255, 255, 0.5);
      --glass-bg: rgba(20, 22, 28, 0.5);
      --glass-border: rgba(212, 175, 55, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes slowPan {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    body {
      width: 1080px;
      height: 1080px;
      font-family: 'Noto Sans Ethiopic', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ambient-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
        linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      z-index: 0;
    }

    .texture-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .ornamental-frame {
      position: absolute;
      top: 45px; left: 45px; right: 45px; bottom: 45px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      pointer-events: none;
      z-index: 2;
    }
    .ornamental-frame::before, .ornamental-frame::after {
      content: ''; position: absolute; width: 30px; height: 30px;
      border: 2px solid var(--accent-gold);
    }
    .ornamental-frame::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
    .ornamental-frame::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

    .corner-tl { position: absolute; top: -2px; right: -2px; width: 30px; height: 30px; border-top: 2px solid var(--accent-gold); border-right: 2px solid var(--accent-gold); }
    .corner-br { position: absolute; bottom: -2px; left: -2px; width: 30px; height: 30px; border-bottom: 2px solid var(--accent-gold); border-left: 2px solid var(--accent-gold); }

    .large-watermark {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 800px;
      color: rgba(255, 255, 255, 0.02);
      font-family: serif;
      pointer-events: none;
      z-index: 1;
      line-height: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px;
    }

    .quote-mark-open {
      position: absolute;
      top: -40px;
      left: 40px;
      font-size: 140px;
      color: var(--accent-glow);
      font-family: serif;
      line-height: 1;
      pointer-events: none;
    }

    .card {
      background: linear-gradient(145deg, rgba(30, 32, 40, 0.7), rgba(15, 16, 20, 0.8));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 4px;
      padding: 80px 100px;
      position: relative;
      box-shadow: 0 50px 100px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      max-width: 840px;
      width: 100%;
      text-align: center;
      animation: float 10s ease-in-out infinite;
    }

    .card-top-accent {
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    .theme-badge {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-tertiary);
      border: 1px solid var(--glass-border);
      color: var(--accent-gold-light);
      padding: 8px 30px;
      border-radius: 30px;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .quote-text {
      font-size: clamp(36px, 5vw, 54px);
      font-weight: 800;
      line-height: 1.4;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-gold-light) 60%, #ffffff 80%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 15px rgba(0,0,0,0.4);
      position: relative;
      z-index: 2;
      letter-spacing: -0.02em;
      display: -webkit-box; -webkit-line-clamp: 7; -webkit-box-orient: vertical; overflow: hidden;
    }

    .separator {
      margin: 50px auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .separator-line {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold-dim), transparent);
    }
    .separator-icon {
      color: var(--accent-gold);
      font-size: 24px;
      filter: drop-shadow(0 0 5px var(--accent-glow));
    }

    .footer {
      position: absolute;
      bottom: 80px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--accent-gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--accent-gold);
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .brand-text {
      font-size: 14px;
      letter-spacing: 0.4em;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 700;
    }
    .brand-gold {
      color: var(--accent-gold);
    }

    .daily-tag {
      font-size: 13px;
      letter-spacing: 0.4em;
      color: var(--accent-gold);
      text-transform: uppercase;
      border: 1px solid var(--glass-border);
      padding: 6px 20px;
      border-radius: 20px;
      font-weight: 800;
      background: rgba(212, 175, 55, 0.05);
    }

  </style>
</head>
<body>
  <div class="ambient-bg"></div>
  <div class="texture-overlay"></div>
  <div class="large-watermark">✝</div>
  
  <div class="ornamental-frame">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
  </div>

  <div class="content-wrapper">
    <div class="card">
      <div class="card-top-accent"></div>
      <div class="theme-badge" id="theme-badge">መንፈሳዊ ቃል</div>
      <div class="quote-mark-open">❝</div>
      
      <p class="quote-text" id="quote-text">።።።</p>
      
      <div class="separator">
        <div class="separator-line"></div>
        <div class="separator-icon">❖</div>
        <div class="separator-line"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="brand-logo">
      <div class="brand-icon">✝</div>
      <div class="brand-text">EOTC <span class="brand-gold">Youth</span></div>
    </div>
    <div class="daily-tag">Daily Inspiration</div>
  </div>
</body>
</html>
