<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Weekly Reflection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --accent-primary: #0a0b10;
      --accent-gold: #b8860b;
      --text-dark: #111827;
      --text-body: #374151;
      --text-muted: #6b7280;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px; /* Story size */
      font-family: 'Noto Sans Ethiopic', sans-serif;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    .paper-texture {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      z-index: 1; pointer-events: none;
    }

    .border-frame {
      position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px;
      border: 2px solid var(--accent-gold);
      z-index: 2;
      pointer-events: none;
    }
    
    .border-frame::before {
      content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(184, 134, 11, 0.3);
    }

    .content {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 140px;
    }

    .header {
      text-align: center; margin-bottom: 80px;
    }

    .week-tag {
      font-size: 20px; font-weight: 700; letter-spacing: 0.3em;
      color: var(--accent-gold); text-transform: uppercase;
      margin-bottom: 20px; display: inline-block;
      border-bottom: 1px solid var(--accent-gold); padding-bottom: 10px;
    }

    .title {
      font-size: 64px; font-weight: 900; color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 30px;
    }

    .scripture-highlight {
      background: rgba(184, 134, 11, 0.05);
      border-left: 6px solid var(--accent-gold);
      padding: 40px;
      margin-bottom: 60px;
      font-size: 36px; font-weight: 600; color: var(--text-dark);
      line-height: 1.6; font-style: italic;
    }

    .scripture-ref {
      display: block; margin-top: 20px; font-size: 24px;
      color: var(--accent-gold); font-weight: 700; font-style: normal;
    }

    .reflection-body {
      font-size: 38px; line-height: 1.8; color: var(--text-body);
      flex: 1; display: flex; flex-direction: column;
    }
    
    .reflection-body p { margin-bottom: 40px; }

    .prayer-section {
      margin-top: auto;
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 50px;
      position: relative;
    }

    .prayer-label {
      font-size: 22px; font-weight: 800; letter-spacing: 0.2em;
      color: var(--accent-gold); text-transform: uppercase;
      margin-bottom: 20px;
    }

    .prayer-text {
      font-size: 34px; font-weight: 500; color: var(--text-dark);
      line-height: 1.6; font-style: italic;
    }

    .footer {
      display: flex; justify-content: center; align-items: center;
      margin-top: 60px; gap: 20px;
    }

    .logo-cross { color: var(--accent-gold); font-size: 30px; }
    .brand { font-size: 18px; letter-spacing: 0.4em; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

  </style>
</head>
<body>
  <div class="paper-texture"></div>
  <div class="border-frame"></div>

  <div class="content">
    <div class="header">
      <div class="week-tag">የሳምንቱ መንፈሳዊ ትምህርት</div>
      <h1 class="title" id="title">ርዕስ</h1>
    </div>

    <div class="scripture-highlight">
      <span id="scripture-text">የመጽሐፍ ቅዱስ ቃል...</span>
      <span class="scripture-ref" id="scripture-ref">ማጣቀሻ</span>
    </div>

    <div class="reflection-body" id="reflection-body">
      <p>ማብራሪያ...</p>
    </div>

    <div class="prayer-section">
      <div class="prayer-label">ጸሎት</div>
      <div class="prayer-text" id="prayer-text">አቤቱ አምላካችን...</div>
    </div>

    <div class="footer">
      <span class="logo-cross">✝</span>
      <span class="brand">EOTC Media Studio</span>
    </div>
  </div>
</body>
</html>
