<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Weekly Reflection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f7f6f3;
      --bg-secondary: #fefefe;
      --bg-warm: #f4f1eb;
      --accent-primary: #0a0b10;
      --accent-gold: #b8860b;
      --accent-gold-light: #d4a418;
      --accent-gold-dim: rgba(184, 134, 11, 0.6);
      --accent-gold-glow: rgba(184, 134, 11, 0.12);
      --text-dark: #111827;
      --text-body: #374151;
      --text-muted: #6b7280;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    body {
      width: 1080px;
      height: 1920px;
      font-family: 'Noto Sans Ethiopic', sans-serif;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    /* Warm background gradient */
    .bg-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(184, 134, 11, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(184, 134, 11, 0.03) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-warm) 50%, var(--bg-primary) 100%);
      z-index: 0;
    }

    /* Paper texture */
    .paper-texture {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      z-index: 1; pointer-events: none;
    }

    /* Double border frame */
    .border-frame {
      position: absolute; top: 58px; left: 58px; right: 58px; bottom: 58px;
      border: 2px solid var(--accent-gold);
      z-index: 2;
      pointer-events: none;
    }
    
    .border-frame::before {
      content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(184, 134, 11, 0.25);
    }

    /* Corner ornaments */
    .border-frame::after {
      content: '✦';
      position: absolute; top: -8px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: var(--accent-gold);
      background: var(--bg-primary);
      padding: 0 12px;
    }

    /* === Content === */
    .content {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 100px;
    }

    .header {
      text-align: center; margin-bottom: 50px; flex-shrink: 0;
    }

    .week-tag {
      font-size: 18px; font-weight: 700; letter-spacing: 0.2em;
      color: var(--accent-gold); text-transform: uppercase;
      margin-bottom: 22px; display: inline-block;
      border-bottom: 1.5px solid var(--accent-gold); padding-bottom: 10px;
    }

    .title {
      font-size: 50px; font-weight: 900; color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 20px;
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      letter-spacing: -0.01em;
    }

    /* Scripture highlight block */
    .scripture-highlight {
      background: linear-gradient(135deg, var(--accent-gold-glow), rgba(184, 134, 11, 0.03));
      border-left: 6px solid var(--accent-gold);
      padding: 24px 32px;
      margin-bottom: 30px;
      font-size: 26px; font-weight: 600; color: var(--text-dark);
      line-height: 1.65; font-style: italic;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }

    .scripture-highlight::before {
      content: '❝';
      position: absolute;
      top: 8px; left: 14px;
      font-size: 40px;
      color: rgba(184, 134, 11, 0.15);
      font-family: Georgia, serif;
      font-style: normal;
    }

    .scripture-ref {
      display: block; margin-top: 16px; font-size: 21px;
      color: var(--accent-gold); font-weight: 800; font-style: normal;
      letter-spacing: 0.05em;
    }

    /* Reflection body */
    .reflection-body {
      font-size: 27px; line-height: 1.65; color: var(--text-body);
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    
    .reflection-body p { 
      margin-bottom: 18px; 
    }

    /* Prayer section */
    .prayer-section {
      margin-top: 30px;
      border-top: 1.5px solid rgba(0,0,0,0.08);
      padding-top: 30px;
      position: relative;
      flex-shrink: 0;
    }

    .prayer-label {
      font-size: 19px; font-weight: 800; letter-spacing: 0.22em;
      color: var(--accent-gold); text-transform: uppercase;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }

    .prayer-label::before {
      content: '🙏';
      font-size: 18px;
    }

    .prayer-text {
      font-size: 25px; font-weight: 500; color: var(--text-dark);
      line-height: 1.6; font-style: italic;
      display: -webkit-box; -webkit-line-clamp: 4; line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Footer */
    .footer {
      display: flex; justify-content: center; align-items: center;
      margin-top: 40px; gap: 18px;
      flex-shrink: 0;
    }

    .footer-line {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold-dim), transparent);
    }

    .logo-cross { color: var(--accent-gold); font-size: 24px; }
    .brand {
      font-size: 15px; letter-spacing: 0.4em; color: var(--text-muted);
      font-weight: 700; text-transform: uppercase;
    }

  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="paper-texture"></div>
  <div class="border-frame"></div>

  <div class="content">
    <div class="header">
      <div class="week-tag">የሳምንቱ መንፈሳዊ ትምህርት</div>
      <h1 class="title" id="title">ርዕስ</h1>
    </div>

    <div class="scripture-highlight">
      <span id="scripture-text">የመጽሐፍ ቅዱስ ቃል...</span>
      <span class="scripture-ref" id="scripture-ref">ማጣቀሻ</span>
    </div>

    <div class="reflection-body" id="reflection-body">
      <p>ማብራሪያ...</p>
    </div>

    <div class="prayer-section">
      <div class="prayer-label">ጸሎት</div>
      <div class="prayer-text" id="prayer-text">አቤቱ አምላካችን...</div>
    </div>

    <div class="footer">
      <div class="footer-line"></div>
      <span class="logo-cross">✝</span>
      <span class="brand">EOTC Media Studio</span>
      <div class="footer-line"></div>
    </div>
  </div>
</body>
</html>
