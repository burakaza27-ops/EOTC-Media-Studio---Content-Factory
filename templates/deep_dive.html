<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Deep Dive Carousel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #020617;
      --bg-secondary: #0a0f1c;
      --bg-tertiary: #0d1424;
      --accent-indigo: #1e1b4b;
      --accent-gold: #d4af37;
      --accent-gold-light: #e8c84a;
      --accent-gold-dim: #b8962e;
      --text-primary: #f8fafc;
      --text-secondary: rgba(248, 250, 252, 0.6);
      --text-muted: rgba(248, 250, 252, 0.35);
      --glass-bg: rgba(255, 255, 255, 0.025);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-highlight: rgba(255, 255, 255, 0.03);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    body {
      width: 1080px;
      height: 1350px;
      font-family: 'Noto Sans Ethiopic', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
    }

    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 100% 60% at 30% 100%, rgba(30, 27, 75, 0.8) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 10%, rgba(30, 27, 75, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 60% 40%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
    }

    .mesh-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(at 20% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
        radial-gradient(at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 40%);
      animation: gradientShift 15s ease infinite;
      background-size: 200% 200%;
    }

    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.025;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .frame {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 3px;
      pointer-events: none;
      z-index: 2;
    }

    .frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(180deg, rgba(255,255,255,0.015) 0%, transparent 100%);
    }

    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 350px;
      opacity: 0.012;
      color: #ffffff;
      pointer-events: none;
      z-index: 0;
      font-weight: 300;
      letter-spacing: -0.05em;
    }

    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 100px;
      z-index: 1;
    }

    .header {
      position: absolute;
      top: 50px;
      left: 60px;
      right: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slide-counter {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .counter-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--accent-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent-gold);
      background: rgba(212, 175, 55, 0.05);
    }

    .counter-line {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-gold), transparent);
    }

    .slide-total {
      font-size: 11px;
      letter-spacing: 0.4em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .topic-badge {
      position: absolute;
      top: 50px;
      right: 60px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(212, 175, 55, 0.05));
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--accent-gold);
      text-transform: uppercase;
      font-weight: 600;
    }

    .title-container {
      margin-bottom: 50px;
      text-align: center;
    }

    .title {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      line-height: 1.15;
      animation: fadeIn 0.6s ease-out 0.1s both;
    }

    .title-gold {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 50px;
    }

    .divider-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    }

    .divider-icon {
      font-size: 18px;
      color: var(--accent-gold);
      opacity: 0.5;
    }

    .content-card {
      max-width: 680px;
      width: 100%;
    }

    .glass-card {
      background: linear-gradient(135deg, var(--glass-bg), rgba(255,255,255,0.015));
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 60px 70px;
      border-radius: 3px;
      position: relative;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    .gold-accent {
      position: absolute;
      left: 0;
      top: 30px;
      bottom: 30px;
      width: 2px;
      background: linear-gradient(180deg, transparent 0%, var(--accent-gold) 30%, var(--accent-gold) 70%, transparent 100%);
      border-radius: 1px;
    }

    .content-text {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--text-primary);
      line-height: 1.75;
      padding-left: 28px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .scripture-ref {
      margin-top: 45px;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.3em;
      text-align: center;
      text-transform: uppercase;
      font-weight: 500;
    }

    .footer {
      position: absolute;
      bottom: 55px;
      left: 60px;
      right: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .progress-dots {
      display: flex;
      gap: 10px;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .progress-dot.active {
      background: var(--accent-gold);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
      transform: scale(1.2);
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
      transition: width 0.5s ease;
    }

    .floating-element {
      position: absolute;
      pointer-events: none;
    }

    .floating-cross {
      font-size: 50px;
      opacity: 0.08;
      color: var(--accent-gold);
      animation: pulse 4s ease-in-out infinite;
    }

    .floating-cross.top-right {
      top: 120px;
      right: 140px;
    }

    .floating-cross.bottom-left {
      bottom: 140px;
      left: 120px;
      animation-delay: 2s;
    }

    .corner-accent {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .corner-accent.top-left {
      top: 40px;
      left: 40px;
      border-right: none;
      border-bottom: none;
    }

    .corner-accent.bottom-right {
      bottom: 40px;
      right: 40px;
      border-left: none;
      border-top: none;
    }

    .swirl {
      position: absolute;
      width: 200px;
      height: 200px;
      border: 1px solid rgba(212, 175, 55, 0.05);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .swirl::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      width: 2px;
      height: 30px;
      background: var(--accent-gold);
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="mesh-gradient"></div>
  <div class="noise-overlay"></div>
  <div class="frame"></div>
  <div class="watermark">✝</div>
  <div class="swirl"></div>
  <div class="floating-element floating-cross top-right">✝</div>
  <div class="floating-element floating-cross bottom-left">✝</div>
  <div class="corner-accent top-left"></div>
  <div class="corner-accent bottom-right"></div>

  <div class="content">
    <div class="header">
      <div class="slide-counter">
        <div class="counter-circle" id="slide-number">1</div>
        <div class="counter-line"></div>
      </div>
      <div class="slide-total" id="slide-total">1 / 5</div>
    </div>

    <div class="topic-badge" id="topic-badge">ሥነ ነገር</div>

    <div class="title-container">
      <h1 class="title" id="title">ተስፋና ትዕግስት</h1>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">✝</span>
      <div class="divider-line"></div>
    </div>

    <div class="content-card">
      <div class="glass-card">
        <div class="gold-accent"></div>
        <p class="content-text" id="quote-text">።።።</p>
      </div>
    </div>

    <p class="scripture-ref" id="scripture-ref">ማርቆስ ፲፮፻፲፮</p>
  </div>

  <div class="footer">
    <div class="brand">EOTC Youth</div>
    <div class="progress-dots" id="progress-dots">
      <div class="progress-dot active"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>
  </div>

  <div class="progress-bar" id="progress-bar" style="width: 20%"></div>
</body>
</html>
