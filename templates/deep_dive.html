<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #040507;
      --bg-secondary: #090a0f;
      --accent-gold: #d4af37;
      --accent-gold-light: #f3e5ab;
      --accent-gold-bright: #ffd700;
      --accent-gold-dim: #8a7322;
      --accent-highlight: #1e3a8a;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.88);
      --text-muted: rgba(255, 255, 255, 0.48);
      --glass-border: rgba(212, 175, 55, 0.2);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "kern" 1, "liga" 1;
    }

    body {
      width: 1080px;
      height: 1350px;
      font-family: 'Noto Sans Ethiopic', sans-serif;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
    }

    /* === Multi-layer background === */
    .bg-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 50% -5%, rgba(30, 58, 138, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 105%, rgba(212, 175, 55, 0.10) 0%, transparent 55%),
        radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.04) 0%, transparent 40%);
      z-index: 0;
    }

    .noise {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      z-index: 1; pointer-events: none;
    }

    .vignette {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.35) 100%);
      z-index: 1; pointer-events: none;
    }

    .frame {
      position: absolute; top: 50px; left: 50px; right: 50px; bottom: 50px;
      border: 1px solid rgba(255,255,255,0.04);
      z-index: 2; border-radius: 8px;
    }

    /* === Main Content === */
    .main-content {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 120px 100px;
    }

    .header-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 80px;
    }

    .slide-indicator {
      display: flex; align-items: center; gap: 20px;
    }

    .slide-number-box {
      width: 80px; height: 80px;
      border: 2px solid var(--accent-gold);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: var(--accent-gold-light);
      background: rgba(212, 175, 55, 0.05);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.1), inset 0 0 15px rgba(212, 175, 55, 0.03);
    }

    .slide-total {
      font-size: 15px; letter-spacing: 0.35em;
      color: var(--text-muted); text-transform: uppercase; font-weight: 700;
      margin-left: 10px;
    }

    .topic-tag {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 26px; border-radius: 30px;
      font-size: 14px; letter-spacing: 0.22em; color: var(--text-secondary);
      text-transform: uppercase; font-weight: 600;
    }

    .title-section {
      text-align: left; margin-bottom: 60px;
    }

    .title {
      font-size: 70px; font-weight: 900; line-height: 1.2;
      background: linear-gradient(to right, #ffffff 20%, var(--accent-gold-light) 50%, #ffffff 80%);
      background-clip: text;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .title-accent-line {
      width: 120px; height: 4px;
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-dim));
      margin-top: 30px;
      border-radius: 2px;
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.45);
    }

    .content-box {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
    }

    .quote-text {
      font-size: 50px; font-weight: 600; line-height: 1.55;
      color: var(--text-secondary);
      position: relative; padding-left: 60px;
      border-left: 2.5px solid var(--accent-gold);
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .quote-text::before {
      content: '❝'; position: absolute; left: -28px; top: -30px;
      font-size: 80px; color: rgba(212, 175, 55, 0.25); font-family: Georgia, serif;
    }

    .reference-box {
      margin-top: 80px; align-self: flex-start;
      background: linear-gradient(90deg, rgba(212, 175, 55, 0.10), rgba(212, 175, 55, 0.02), transparent);
      padding: 16px 40px 16px 22px;
      border-left: 4px solid var(--accent-gold);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .reference-text {
      font-size: 20px; color: var(--accent-gold-light);
      letter-spacing: 0.1em; font-weight: 700;
    }

    /* === Footer === */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: 40px;
    }

    .brand-group {
      display: flex; align-items: center; gap: 15px;
    }

    .brand-logo { color: var(--accent-gold); font-size: 24px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.2)); }
    .brand-name {
      font-size: 15px; letter-spacing: 0.3em; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
    }

    .dots-container {
      display: flex; gap: 12px;
    }

    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }

    .dot.active {
      background: var(--accent-gold);
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.6);
      transform: scale(1.3);
    }

    .progress-bar-container {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
      background: rgba(255,255,255,0.02); z-index: 20;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-gold-dim), var(--accent-gold), var(--accent-gold-bright));
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
      border-radius: 0 3px 3px 0;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="noise"></div>
  <div class="vignette"></div>
  <div class="frame"></div>

  <div class="main-content">
    <div class="header-row">
      <div class="slide-indicator">
        <div class="slide-number-box" id="slide-number">1</div>
        <div class="slide-total" id="slide-total">OF 5</div>
      </div>
      <div class="topic-tag" id="topic-badge">ክፍል</div>
    </div>

    <div class="title-section">
      <h1 class="title" id="title">ርዕስ ይገባል</h1>
      <div class="title-accent-line"></div>
    </div>

    <div class="content-box">
      <p class="quote-text" id="quote-text">።።።</p>
      
      <div class="reference-box" id="reference-box" style="display: none;">
        <span class="reference-text" id="scripture-ref"></span>
      </div>
    </div>

    <div class="footer">
      <div class="brand-group">
        <div class="brand-logo">❖</div>
        <div class="brand-name">EOTC Media</div>
      </div>
      
      <div class="dots-container" id="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar" style="width: 20%"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const ref = document.getElementById('scripture-ref');
      const refBox = document.getElementById('reference-box');
      if(ref && ref.textContent.trim().length > 0) {
        refBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
