<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOTC Deep Dive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #050608;
      --bg-secondary: #0a0b10;
      --accent-gold: #d4af37;
      --accent-gold-light: #f3e5ab;
      --accent-gold-dim: #8a7322;
      --accent-highlight: #1e3a8a; /* Deep royal blue for contrast */
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.85);
      --text-muted: rgba(255, 255, 255, 0.5);
      --glass-border: rgba(212, 175, 55, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      font-family: 'Noto Sans Ethiopic', sans-serif;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
    }

    .bg-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 0%, rgba(30, 58, 138, 0.15) 0%, transparent 60%),
                  radial-gradient(circle at 50% 100%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
      z-index: 0;
    }

    .noise {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      z-index: 1; pointer-events: none;
    }

    .frame {
      position: absolute; top: 50px; left: 50px; right: 50px; bottom: 50px;
      border: 1px solid rgba(255,255,255,0.05);
      z-index: 2; border-radius: 8px;
    }

    .main-content {
      position: relative; z-index: 10;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      padding: 120px 100px;
    }

    .header-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 80px;
    }

    .slide-indicator {
      display: flex; align-items: center; gap: 20px;
    }

    .slide-number-box {
      width: 80px; height: 80px;
      border: 2px solid var(--accent-gold);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: var(--accent-gold-light);
      background: rgba(212, 175, 55, 0.05);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
    }

    .slide-total {
      font-size: 16px; letter-spacing: 0.3em;
      color: var(--text-muted); text-transform: uppercase; font-weight: 700;
      margin-left: 10px;
    }

    .topic-tag {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 24px; border-radius: 30px;
      font-size: 14px; letter-spacing: 0.2em; color: var(--text-secondary);
      text-transform: uppercase; font-weight: 600;
    }

    .title-section {
      text-align: left; margin-bottom: 60px;
    }

    .title {
      font-size: 72px; font-weight: 900; line-height: 1.2;
      background: linear-gradient(to right, #ffffff, var(--accent-gold-light), #ffffff);
      background-clip: text;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .title-accent-line {
      width: 120px; height: 4px;
      background: var(--accent-gold);
      margin-top: 30px;
      border-radius: 2px;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    .content-box {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
    }

    .quote-text {
      font-size: 52px; font-weight: 600; line-height: 1.5;
      color: var(--text-secondary);
      position: relative; padding-left: 60px;
      border-left: 2px solid var(--accent-gold);
    }

    .quote-text::before {
      content: '❝'; position: absolute; left: -25px; top: -30px;
      font-size: 80px; color: rgba(212, 175, 55, 0.3); font-family: serif;
    }

    .reference-box {
      margin-top: 80px; align-self: flex-start;
      background: linear-gradient(90deg, rgba(212, 175, 55, 0.1), transparent);
      padding: 15px 40px 15px 20px;
      border-left: 4px solid var(--accent-gold);
    }

    .reference-text {
      font-size: 20px; color: var(--accent-gold-light);
      letter-spacing: 0.1em; font-weight: 700;
    }

    .footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: 40px;
    }

    .brand-group {
      display: flex; align-items: center; gap: 15px;
    }

    .brand-logo { color: var(--accent-gold); font-size: 24px; }
    .brand-name {
      font-size: 15px; letter-spacing: 0.3em; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
    }

    .dots-container {
      display: flex; gap: 12px;
    }

    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }

    .dot.active {
      background: var(--accent-gold);
      box-shadow: 0 0 15px var(--accent-gold);
      transform: scale(1.3);
    }

    .progress-bar-container {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 8px;
      background: rgba(255,255,255,0.02); z-index: 20;
    }

    .progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--accent-gold-dim), var(--accent-gold));
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="noise"></div>
  <div class="frame"></div>

  <div class="main-content">
    <div class="header-row">
      <div class="slide-indicator">
        <div class="slide-number-box" id="slide-number">1</div>
        <div class="slide-total" id="slide-total">OF 5</div>
      </div>
      <div class="topic-tag" id="topic-badge">ክፍል</div>
    </div>

    <div class="title-section">
      <h1 class="title" id="title">ርዕስ ይገባል</h1>
      <div class="title-accent-line"></div>
    </div>

    <div class="content-box">
      <p class="quote-text" id="quote-text">።።።</p>
      
      <div class="reference-box" id="reference-box" style="display: none;">
        <span class="reference-text" id="scripture-ref"></span>
      </div>
    </div>

    <div class="footer">
      <div class="brand-group">
        <div class="brand-logo">❖</div>
        <div class="brand-name">EOTC Media</div>
      </div>
      
      <div class="dots-container" id="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar" style="width: 20%"></div>
  </div>

  <script>
    // Example hook for the puppeteer evaluate logic
    // Added reference-box display toggle logic
    document.addEventListener("DOMContentLoaded", () => {
      // In puppeteer, window.slideData will be injected or DOM will be modified directly.
      // Small polyfill to handle ref box display
      const ref = document.getElementById('scripture-ref');
      const refBox = document.getElementById('reference-box');
      if(ref && ref.textContent.trim().length > 0) {
        refBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
