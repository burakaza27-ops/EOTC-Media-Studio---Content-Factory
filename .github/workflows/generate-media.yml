name: Daily Content Generator

on:
  schedule:
    # 5 AM EAT (UTC 2:00) - Morning Daily Verse
    - cron: '0 2 * * *'
    # 12 PM EAT (UTC 9:00) - Midday Power Quote
    - cron: '0 9 * * *'
    # 6 PM EAT (UTC 15:00) - Evening Carousel
    - cron: '0 15 * * *'
    # SUNDAY 8 AM EAT (UTC 5:00) - Weekly Reflection
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Content type to generate manually'
        type: choice
        options:
          - quote
          - verse
          - carousel
          - reflection
        default: quote

concurrency:
  group: content-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgbm1 libasound2t64 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libpango-1.0-0 libcairo2 libatspi2.0-0 \
            libxshmfence1 fonts-noto-color-emoji fonts-noto-core

      - name: Install Project Dependencies
        run: npm ci --prefer-offline

      - name: Create Environment File
        shell: bash
        run: |
          cat > .env << EOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_TABLE=${{ vars.SUPABASE_TABLE || 'quotes' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          AI_MODEL=${{ vars.AI_MODEL || 'google/gemini-2.0-flash-001' }}
          PUPPETEER_EXEC_PATH=/usr/bin/google-chrome
          LOG_LEVEL=INFO
          EOF

      - name: Determine Content Type
        id: compute-type
        run: |
          # Default manual input
          TYPE="${{ github.event.inputs.content_type }}"
          
          # Compute schedule
          HOUR=$(date -u +"%H")
          DOW=$(date -u +"%u")
          
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ "$DOW" == "7" ] && [ "$HOUR" == "05" ]; then
              TYPE="reflection"
            elif [ "$HOUR" == "02" ]; then
              TYPE="verse"
            elif [ "$HOUR" == "09" ]; then
              TYPE="quote"
            elif [ "$HOUR" == "15" ]; then
              TYPE="carousel"
            else
              TYPE="quote"
            fi
          fi
          
          if [ -z "$TYPE" ]; then
            TYPE="quote"
          fi
          
          echo "Determined type: $TYPE"
          echo "target_type=$TYPE" >> $GITHUB_OUTPUT

      - name: Run Pipeline
        id: pipeline
        run: node src/index.js ${{ steps.compute-type.outputs.target_type }}

      - name: Upload Single Image Artifacts
        if: always() && steps.compute-type.outputs.target_type != 'carousel'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.compute-type.outputs.target_type }}-${{ github.run_id }}
          path: ./output.png
          retention-days: 7

      - name: Upload Carousel Artifacts
        if: always() && steps.compute-type.outputs.target_type == 'carousel'
        uses: actions/upload-artifact@v4
        with:
          name: carousel-${{ github.run_id }}
          path: ./temp/carousel/run_*/*.png
          retention-days: 7

      - name: Run Summary
        if: always()
        run: |
          echo "## EOTC Media Studio Pipeline 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.pipeline.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Content**: ${{ steps.compute-type.outputs.target_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
