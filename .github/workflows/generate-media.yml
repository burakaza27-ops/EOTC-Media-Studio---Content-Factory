name: Daily Content Generator

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Content type to generate'
        type: choice
        options:
          - quote
          - verse
          - carousel
          - reflection
        default: quote
      use_liturgical:
        description: 'Apply Liturgical Calendar Context (feast/fast/saint of the day)'
        type: boolean
        default: true

concurrency:
  group: content-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgbm1 libasound2t64 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libpango-1.0-0 libcairo2 libatspi2.0-0 \
            libxshmfence1 fonts-noto-color-emoji fonts-noto-core

      - name: Install Project Dependencies
        run: npm ci --prefer-offline

      - name: Create Environment File
        shell: bash
        run: |
          cat > .env << EOF
          GOOGLE_AI_STUDIO_API=${{ secrets.GOOGLE_AI_STUDIO_API }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_TABLE=${{ vars.SUPABASE_TABLE || 'quotes' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          AI_MODEL=${{ vars.AI_MODEL || 'gemini-3-flash' }}
          PUPPETEER_EXEC_PATH=/usr/bin/google-chrome
          LOG_LEVEL=INFO
          EOF

      - name: Determine Content Type
        id: compute-type
        run: |
          # Default manual input
          TYPE="${{ github.event.inputs.content_type }}"
          LITURGICAL="${{ github.event.inputs.use_liturgical }}"
          
          if [ -z "$TYPE" ]; then
            TYPE="quote"
          fi
          
          if [ -z "$LITURGICAL" ]; then
            LITURGICAL="true"
          fi
          
          echo "Determined type: $TYPE (liturgical: $LITURGICAL)"
          echo "target_type=$TYPE" >> $GITHUB_OUTPUT
          echo "use_liturgical=$LITURGICAL" >> $GITHUB_OUTPUT

      - name: Run Pipeline
        id: pipeline
        run: |
          LITURGICAL_FLAG=""
          if [ "${{ steps.compute-type.outputs.use_liturgical }}" == "true" ]; then
            LITURGICAL_FLAG="--liturgical"
          fi
          node src/index.js ${{ steps.compute-type.outputs.target_type }} $LITURGICAL_FLAG

      - name: Upload Single Image Artifacts
        if: always() && steps.compute-type.outputs.target_type != 'carousel'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.compute-type.outputs.target_type }}-${{ github.run_id }}
          path: ./output.png
          retention-days: 7

      - name: Upload Carousel Artifacts
        if: always() && steps.compute-type.outputs.target_type == 'carousel'
        uses: actions/upload-artifact@v4
        with:
          name: carousel-${{ github.run_id }}
          path: ./temp/carousel/run_*/*.png
          retention-days: 7

      - name: Run Summary
        if: always()
        run: |
          echo "## EOTC Media Studio Pipeline 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.pipeline.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Content**: ${{ steps.compute-type.outputs.target_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Liturgical**: ${{ steps.compute-type.outputs.use_liturgical }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
